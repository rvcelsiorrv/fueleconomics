<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link
      rel="mask-icon"
      href="/safari-pinned-tab.svg"
      color="#1d4ed8"
    />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Учёт ремонта топливных систем автопарка: журнал по населённым пунктам, ТНВД; данные в браузере (демо)" />
    <title>Учёт ремонта топливных систем</title>
    <script>
      (function () {
        try {
          var k = 'lavka-theme'
          var s = localStorage.getItem(k)
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var t = s === 'light' || s === 'dark' ? s : sysDark ? 'dark' : 'light'
          document.documentElement.setAttribute('data-theme', t)
          document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light'
          document.documentElement.classList.toggle('dark', t === 'dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
